name: Build trainer image and deploy to EKS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push trainer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ml
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/crisislens-trainer:latest

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.27.0'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Deploy retrain Job manifest
        env:
          TRAINER_IMAGE: ghcr.io/${{ github.repository_owner }}/crisislens-trainer:latest
          S3_MANIFEST: ${{ secrets.TRAINING_MANIFEST }}
        run: |
          sed "s|{{TRAINER_IMAGE}}|${TRAINER_IMAGE}|g; s|{{S3_MANIFEST}}|${S3_MANIFEST}|g" infra/k8s/retrain-job.yaml | kubectl apply -f -
