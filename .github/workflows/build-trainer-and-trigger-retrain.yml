name: Build trainer image and trigger retrain

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push trainer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ml
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/crisislens-trainer:latest,ghcr.io/${{ github.repository_owner }}/crisislens-trainer:${{ github.sha }}

  trigger-retrain:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger retrain API
        env:
          APP_URL: ${{ secrets.APP_URL }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          TRAINING_MANIFEST: ${{ secrets.TRAINING_MANIFEST }}
          IMAGE_TAG: ghcr.io/${{ github.repository_owner }}/crisislens-trainer:${{ github.sha }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$DEPLOY_KEY" ] || [ -z "$TRAINING_MANIFEST" ]; then
            echo "Skipping retrain trigger because APP_URL, DEPLOY_KEY, or TRAINING_MANIFEST is missing."
            exit 0
          fi
          echo "Calling retrain endpoint with image $IMAGE_TAG"
          curl -sS -X POST "$APP_URL/api/kubeflow/retrain" \
            -H "Authorization: Bearer $DEPLOY_KEY" \
            -H "Content-Type: application/json" \
            -d '{"manifest":"'"$TRAINING_MANIFEST"'","tag":"workflow-${{ github.sha }}","image":"'"$IMAGE_TAG"'"}'
