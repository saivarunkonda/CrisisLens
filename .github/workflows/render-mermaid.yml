name: Render Mermaid diagrams

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Render Mermaid to SVG
        env:
          INPUT: docs/architecture.mmd
          OUTPUT: docs/architecture.svg
        run: |
          docker run --rm -v $GITHUB_WORKSPACE:/data minlag/mermaid-cli -i /data/$INPUT -o /data/$OUTPUT || exit 0

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain | grep docs/architecture.svg; then
            git add docs/architecture.svg
            git commit -m "chore(docs): render mermaid diagrams"
            git push
          else
            echo "No changes to commit"
          fi
