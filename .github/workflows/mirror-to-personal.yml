name: Mirror to personal repo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to target repo
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
          TARGET_REPO: ${{ secrets.TARGET_REPO }} # e.g. saivarunkonda007/crisislense
        run: |
          if [ -z "$MIRROR_PAT" ] || [ -z "$TARGET_REPO" ]; then
            echo "MIRROR_PAT and TARGET_REPO secrets must be set"; exit 1
          fi
          echo "Setting mirror remote to $TARGET_REPO"
          git remote add mirror https://x-access-token:${MIRROR_PAT}@github.com/${TARGET_REPO}.git
          git push --mirror mirror
