name: Deploy CrisisLens

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: crisislens-training-data

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || '' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || '' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || '' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY || '' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || '' }}

      - name: Test ML service
        run: |
          cd ml-service
          pip install -r requirements.txt
          python -m py_compile app.py train.py

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ML service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ml
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ml:latest
            ghcr.io/${{ github.repository }}/ml:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate training manifest
        run: |
          cat > manifest.json << EOF
          {
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "version": "${{ github.sha }}",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}",
            "workflow": "${{ github.workflow }}",
            "images": {
              "web": "ghcr.io/${{ github.repository }}/web:${{ github.sha }}",
              "ml": "ghcr.io/${{ github.repository }}/ml:${{ github.sha }}"
            },
            "environment": "production"
          }
          EOF

      - name: Upload manifest to S3
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        run: |
          aws s3 cp manifest.json s3://${{ env.S3_BUCKET }}/manifests/${{ github.sha }}.json
          aws s3 cp manifest.json s3://${{ env.S3_BUCKET }}/manifests/latest.json

      - name: Create deployment script
        run: |
          cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          
          echo "🚀 Deploying CrisisLens..."
          
          # Pull latest images
          docker pull ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          docker pull ghcr.io/${{ github.repository }}/ml:${{ github.sha }}
          
          # Stop existing containers
          docker-compose down || true
          
          # Update docker-compose with new image tags
          sed -i "s|ghcr.io/${{ github.repository }}/web:latest|ghcr.io/${{ github.repository }}/web:${{ github.sha }}|g" docker-compose.yml
          sed -i "s|ghcr.io/${{ github.repository }}/ml:latest|ghcr.io/${{ github.repository }}/ml:${{ github.sha }}|g" docker-compose.yml
          
          # Start services
          docker-compose up -d
          
          echo "✅ Deployment completed!"
          echo "🌐 Web app: http://localhost:3000"
          echo "🤖 ML API: http://localhost:8000"
          EOF
          
          chmod +x deploy.sh

      - name: Upload deployment script to S3
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        run: |
          aws s3 cp deploy.sh s3://${{ env.S3_BUCKET }}/deployments/${{ github.sha }}/deploy.sh

      - name: Update deployment trigger
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        run: |
          cat > deployment-trigger.json << EOF
          {
            "deployment_id": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "images": {
              "web": "ghcr.io/${{ github.repository }}/web:${{ github.sha }}",
              "ml": "ghcr.io/${{ github.repository }}/ml:${{ github.sha }}"
            },
            "manifest": "s3://${{ env.S3_BUCKET }}/manifests/${{ github.sha }}.json",
            "deploy_script": "s3://${{ env.S3_BUCKET }}/deployments/${{ github.sha }}/deploy.sh"
          }
          EOF
          
          aws s3 cp deployment-trigger.json s3://${{ env.S3_BUCKET }}/triggers/latest.json

      - name: Create GitHub deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: '${{ github.token }}'
          environment: 'production'
          ref: '${{ github.sha }}'

      - name: Update deployment status
        uses: chrnorm/deployment-status@v2
        with:
          token: '${{ github.token }}'
          environment-url: 'https://crisislens.example.com'
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: 'success'

  security-scan:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
