name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          EMERGENCY_API_KEY: ${{ secrets.EMERGENCY_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SOCIAL_MEDIA_API_KEY: ${{ secrets.SOCIAL_MEDIA_API_KEY }}
          EMERGENCY_API_URL: ${{ secrets.EMERGENCY_API_URL }}
          SOCIAL_MEDIA_API_URL: ${{ secrets.SOCIAL_MEDIA_API_URL }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          ML_SERVICE_URL: ${{ secrets.ML_SERVICE_URL }}

      - name: Test ML service
        run: |
          cd ml-service
          pip install -r requirements.txt
          python -m py_compile app.py

  deploy-vercel:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-ml-service:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ML service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ml
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ml:latest
            ghcr.io/${{ github.repository }}/ml:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update ML service deployment
        run: |
          cat > ml-deployment.json << EOF
          {
            "deployment_id": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "ml_image": "ghcr.io/${{ github.repository }}/ml:${{ github.sha }}",
            "vercel_url": "https://crisislens.vercel.app"
          }
          EOF
          
          aws s3 cp ml-deployment.json s3://${{ secrets.S3_BUCKET }}/deployments/${{ github.sha }}/ml-deployment.json
          aws s3 cp ml-deployment.json s3://${{ secrets.S3_BUCKET }}/deployments/latest-ml.json

  update-database:
    needs: [deploy-vercel, deploy-ml-service]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update database schema if needed
        run: |
          # Run database setup script if schema changes
          if [ -f "scripts/setup-database.js" ]; then
            node scripts/setup-database.js
          fi
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Create deployment notification
        run: |
          cat > deployment-notification.json << EOF
          {
            "deployment_id": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "vercel_url": "https://crisislens.vercel.app",
            "ml_image": "ghcr.io/${{ github.repository }}/ml:${{ github.sha }}",
            "status": "deployed",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}"
          }
          EOF
          
          aws s3 cp deployment-notification.json s3://${{ secrets.S3_BUCKET }}/notifications/latest.json

  health-check:
    needs: [deploy-vercel, deploy-ml-service]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Health check Vercel app
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://crisislens.vercel.app)
          if [ $response -eq 200 ]; then
            echo "✅ Vercel app is healthy"
          else
            echo "❌ Vercel app health check failed with status $response"
            exit 1
          fi

      - name: Health check API endpoints
        run: |
          # Test login page
          response=$(curl -s -o /dev/null -w "%{http_code}" https://crisislens.vercel.app/login)
          echo "Login page status: $response"
          
          # Test API health (if available)
          if [ "${{ secrets.ML_SERVICE_URL }}" != "" ]; then
            response=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.ML_SERVICE_URL }}/health)
            echo "ML service health: $response"
          fi

  notify:
    needs: [deploy-vercel, deploy-ml-service, health-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment summary
        run: |
          echo "## 🚀 CrisisLens Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Successfully Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Vercel App:** https://crisislens.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "**ML Service:** ghcr.io/${{ github.repository }}/ml:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Live Features" >> $GITHUB_STEP_SUMMARY
          echo "- Real-time crisis intelligence dashboard" >> $GITHUB_STEP_SUMMARY
          echo "- External API integration (Weather, Emergency, News, Social)" >> $GITHUB_STEP_SUMMARY
          echo "- Machine learning risk predictions" >> $GITHUB_STEP_SUMMARY
          echo "- Real-time WebSocket updates" >> $GITHUB_STEP_SUMMARY
          echo "- Anomaly detection and early warnings" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 System Status" >> $GITHUB_STEP_SUMMARY
          echo "- Database: Supabase (Production)" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: Vercel (Edge Network)" >> $GITHUB_STEP_SUMMARY
          echo "- ML Service: GitHub Container Registry" >> $GITHUB_STEP_SUMMARY
          echo "- CI/CD: GitHub Actions" >> $GITHUB_STEP_SUMMARY
          echo "- Monitoring: Health checks enabled" >> $GITHUB_STEP_SUMMARY
