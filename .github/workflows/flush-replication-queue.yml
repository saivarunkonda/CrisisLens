name: Flush replication queue

on:
  schedule:
    - cron: '0 * * * *' # hourly
  workflow_dispatch:

jobs:
  flush:
    runs-on: ubuntu-latest
    steps:
      - name: Skip flush when secrets are missing
        if: ${{ secrets.APP_URL == '' || secrets.INTERNAL_API_KEY == '' }}
        run: echo "Skipping flush because APP_URL or INTERNAL_API_KEY is missing."

      - name: Trigger internal flush endpoint
        if: ${{ secrets.APP_URL != '' && secrets.INTERNAL_API_KEY != '' }}
        env:
          APP_URL: ${{ secrets.APP_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          curl -sS -X POST "$APP_URL/api/internal/replication/flush" -H "x-internal-key: $INTERNAL_API_KEY" -H "Content-Type: application/json" -d '{}'
