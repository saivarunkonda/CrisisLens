version: '3.8'

services:
  web:
    image: ghcr.io/saivarunkonda/crisislens/web:latest
    container_name: crisislens-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - ML_SERVICE_URL=http://ml:8000
    depends_on:
      - ml
    restart: unless-stopped
    networks:
      - crisislens-network

  ml:
    image: ghcr.io/saivarunkonda/crisislens/ml:latest
    container_name: crisislens-ml
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - crisislens-network

  nginx:
    image: nginx:alpine
    container_name: crisislens-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - ml
    restart: unless-stopped
    networks:
      - crisislens-network

networks:
  crisislens-network:
    driver: bridge

volumes:
  ssl:
    driver: local
