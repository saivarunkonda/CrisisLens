apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig
metadata:
  name: crisislens
  region: us-east-1
nodeGroups:
  - name: ng-standard
    instanceType: t3.medium
    desiredCapacity: 2
  - name: ng-gpu
    instanceType: p3.2xlarge
    desiredCapacity: 0
    labels:
      role: gpu
    taints:
      - key: nvidia.com/gpu
        value: present
        effect: NoSchedule
