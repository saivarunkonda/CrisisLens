apiVersion: apps/v1
kind: Deployment
metadata:
  name: crisislens-ml
  namespace: crisislens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crisislens-ml
  template:
    metadata:
      labels:
        app: crisislens-ml
    spec:
      containers:
        - name: ml
          image: crisislens/ml:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: crisislens-ml
  namespace: crisislens
spec:
  selector:
    app: crisislens-ml
  ports:
    - port: 8000
      targetPort: 8000
